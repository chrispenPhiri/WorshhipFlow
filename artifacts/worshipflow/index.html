<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Phiri WorshipFlow</title>

    <!-- PWA / Installable app -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Phiri WorshipFlow" />
    <link rel="apple-touch-icon" href="icon.svg" />

    <!-- Description -->
    <meta name="description" content="Church worship presentation software — Bible, songs, themes, broadcast" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="icon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Open+Sans:wght@400;600&family=Oswald:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!--
      FOUC-prevention: apply the operator's saved control-screen appearance BEFORE React mounts.
      Skipped on /broadcast so the projection screen keeps its own defaults.
      Reads the resolved CSS values written by lib/control-appearance.ts (saveAppearance) — no need
      to keep preset definitions in sync here.
    -->
    <script>
      (function () {
        try {
          if (/\/broadcast(?:\/|$)/.test(location.pathname)) return;
          var raw = localStorage.getItem('wf-control-appearance');
          if (!raw) return;
          var p = JSON.parse(raw);
          var s = document.documentElement.style;
          if (typeof p.primaryHsl === 'string') {
            s.setProperty('--primary', p.primaryHsl);
            s.setProperty('--ring', p.primaryHsl);
            s.setProperty('--sidebar-primary', p.primaryHsl);
            s.setProperty('--sidebar-ring', p.primaryHsl);
          }
          if (typeof p.fontStack === 'string') {
            s.setProperty('--app-font-sans', p.fontStack);
          }
        } catch (e) { /* ignore corrupt storage */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
