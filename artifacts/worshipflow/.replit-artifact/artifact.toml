kind = "web"
previewPath = "/"
title = "WorshipFlow"
version = "1.0.0"
id = "artifacts/worshipflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19779

[services.development]
run = "pnpm --filter @workspace/worshipflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/worshipflow", "run", "build" ]
publicDir = "artifacts/worshipflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19779"
BASE_PATH = "/"
