openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WorshipFlow API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: songs
    description: Song library management
  - name: schedules
    description: Service schedules
  - name: notes
    description: Sermon notes
  - name: settings
    description: App settings
  - name: screens
    description: Live screen state

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List all songs
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"
    post:
      operationId: createSong
      tags: [songs]
      summary: Create a song
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongBody"
      responses:
        "201":
          description: Created song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /songs/{id}:
    get:
      operationId: getSong
      tags: [songs]
      summary: Get a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
    put:
      operationId: updateSong
      tags: [songs]
      summary: Update a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongBody"
      responses:
        "200":
          description: Updated song
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
    delete:
      operationId: deleteSong
      tags: [songs]
      summary: Delete a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /songs/stats:
    get:
      operationId: getSongStats
      tags: [songs]
      summary: Get song library stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongStats"

  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List all schedules
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      operationId: createSchedule
      tags: [schedules]
      summary: Create a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBody"
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Get a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    put:
      operationId: updateSchedule
      tags: [schedules]
      summary: Update a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleBody"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List all sermon notes
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create sermon notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get sermon notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    put:
      operationId: updateNote
      tags: [notes]
      summary: Update sermon notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete sermon notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /screen:
    get:
      operationId: getScreenState
      tags: [screens]
      summary: Get current live screen state
      responses:
        "200":
          description: Screen state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenState"
    put:
      operationId: updateScreenState
      tags: [screens]
      summary: Update live screen state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenState"
      responses:
        "200":
          description: Updated screen state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenState"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Song:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        category:
          type: string
          enum: [hymn, worship, gospel, contemporary, christmas, shona, ndebele, other]
        lyrics:
          type: string
        key:
          type: string
        tempo:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - category
        - lyrics
        - createdAt
        - updatedAt

    CreateSongBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        category:
          type: string
          enum: [hymn, worship, gospel, contemporary, christmas, shona, ndebele, other]
        lyrics:
          type: string
        key:
          type: string
        tempo:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - author
        - category
        - lyrics

    SongStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
      required:
        - total
        - byCategory

    ScheduleItem:
      type: object
      properties:
        type:
          type: string
          enum: [song, verse, custom_text, prayer, announcement, sermon]
        title:
          type: string
        content:
          type: string
        songId:
          type: integer
        notes:
          type: string
      required:
        - type
        - title

    Schedule:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        serviceType:
          type: string
          enum: [sunday_morning, sunday_evening, wednesday, special, other]
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleItem"
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - serviceType
        - date
        - items
        - createdAt
        - updatedAt

    CreateScheduleBody:
      type: object
      properties:
        title:
          type: string
        serviceType:
          type: string
          enum: [sunday_morning, sunday_evening, wednesday, special, other]
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleItem"
        notes:
          type: string
      required:
        - title
        - serviceType
        - date
        - items

    Note:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        speaker:
          type: string
        date:
          type: string
          format: date
        content:
          type: string
        scriptures:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - speaker
        - date
        - content
        - createdAt
        - updatedAt

    CreateNoteBody:
      type: object
      properties:
        title:
          type: string
        speaker:
          type: string
        date:
          type: string
          format: date
        content:
          type: string
        scriptures:
          type: array
          items:
            type: string
      required:
        - title
        - speaker
        - date
        - content

    Settings:
      type: object
      properties:
        defaultBibleVersion:
          type: string
        defaultFont:
          type: string
        defaultFontSize:
          type: integer
        defaultTextColor:
          type: string
        defaultAccentColor:
          type: string
        theme:
          type: string
          enum: [dark, light]
        tickerEnabled:
          type: boolean
        tickerText:
          type: string
        tickerSpeed:
          type: integer
        churchName:
          type: string
        logoUrl:
          type: string
      required:
        - defaultBibleVersion
        - theme

    TextStyle:
      type: object
      properties:
        fontFamily:
          type: string
        fontSize:
          type: integer
        textColor:
          type: string
        accentColor:
          type: string
        bold:
          type: boolean
        italic:
          type: boolean
        alignment:
          type: string
          enum: [left, center, right]
        animation:
          type: string
          enum: [none, fade_in, glow, float]
      required:
        - fontFamily
        - fontSize
        - textColor
        - alignment
        - animation

    Background:
      type: object
      properties:
        type:
          type: string
          enum: [color, gradient, image, video, camera, live_wallpaper]
        value:
          type: string
        overlay:
          type: number
        fit:
          type: string
          enum: [cover, contain, fill]
        loop:
          type: boolean
        cameraLayout:
          type: string
          enum: [fullscreen, pip-topright, pip-topleft, pip-bottomright, pip-bottomleft, side-left, side-right]
        cameraShape:
          type: string
          enum: [rect, circle, rounded]
        cameraPipSize:
          type: number
      required:
        - type
        - value

    Layout:
      type: object
      properties:
        textScale:
          type: number
        verticalAlign:
          type: string
          enum: [top, center, bottom]
        horizontalAlign:
          type: string
          enum: [left, center, right]
        paddingX:
          type: integer
        paddingY:
          type: integer
        textWidthPct:
          type: integer

    ScreenState:
      type: object
      properties:
        isBlack:
          type: boolean
        isClear:
          type: boolean
        contentType:
          type: string
          enum: [none, verse, song, custom_text, image, video, game]
        title:
          type: string
        content:
          type: string
        textStyle:
          $ref: "#/components/schemas/TextStyle"
        background:
          $ref: "#/components/schemas/Background"
        layout:
          $ref: "#/components/schemas/Layout"
        tickerEnabled:
          type: boolean
        tickerText:
          type: string
        tickerSpeed:
          type: integer
        tickerDivider:
          type: string
        tickerColor:
          type: string
        tickerBgColor:
          type: string
        tickerFontSize:
          type: integer
        idleWatermark:
          type: string
        lowerThirdEnabled:
          type: boolean
        lowerThirdName:
          type: string
        lowerThirdTitle:
          type: string
        lowerThirdPosition:
          type: string
          enum: [bottom-left, bottom-center, bottom-right]
        lowerThirdStyle:
          type: string
          enum: [modern, classic, gradient, minimal]
        lowerThirdNameColor:
          type: string
        lowerThirdTitleColor:
          type: string
        lowerThirdBgColor:
          type: string
        lowerThirdAccentColor:
          type: string
        lowerThirdNameSize:
          type: integer
        lowerThirdTitleSize:
          type: integer
        lowerThirdAutoDismissSec:
          type: integer
          description: "Seconds after which the lower third auto-hides (0 = never)."
        clockOverlayEnabled:
          type: boolean
        clockPosition:
          type: string
          enum: [top-left, top-right, bottom-left, bottom-right]
        clockStyle:
          type: string
          enum: [digital, clean]
        clockShowDate:
          type: boolean
        clockShowSeconds:
          type: boolean
        clockBgColor:
          type: string
        clockBgOpacity:
          type: integer
        clockBgRadius:
          type: integer
        clockBgPadding:
          type: integer
        logoShape:
          type: string
          enum: [rect, circle, rounded, hex, shield]
        logoText:
          type: string
        logoTextColor:
          type: string
        logoTextSize:
          type: integer
        logoTextPosition:
          type: string
          enum: [right, left, below, above]
        logoTextWeight:
          type: string
        textOverlayOpacity:
          type: integer
        textOverlayPadding:
          type: integer
        textOverlayRadius:
          type: integer
        textOverlayLetterSpacing:
          type: integer
        textOverlayAnimation:
          type: string
          enum: [none, fade_in, slide_up, glow, pulse]
        textOverlayMaxWidth:
          type: integer
        textOverlayBorderColor:
          type: string
        textOverlayBorderWidth:
          type: integer
        textOverlayAutoDismissSec:
          type: integer
          description: "Seconds after which the text overlay auto-hides (0 = never)."
        comparisonMode:
          type: boolean
          description: "When true, broadcast renders content and secondaryContent side-by-side (B3.5)."
        secondaryTitle:
          type: string
          description: "Title/reference for the secondary translation when comparisonMode is true."
        secondaryContent:
          type: string
          description: "Body text for the secondary translation when comparisonMode is true."
        timerEnabled:
          type: boolean
        timerMode:
          type: string
          enum: [stopwatch, countdown]
        timerStartedAt:
          type: string
        timerAccumulatedMs:
          type: integer
        timerDurationSec:
          type: integer
        timerPosition:
          type: string
          enum: [top-left, top-center, top-right, center, bottom-left, bottom-center, bottom-right]
        timerFontSize:
          type: integer
        timerColor:
          type: string
        timerBgColor:
          type: string
        timerLabel:
          type: string
        timerWarningSec:
          type: integer
        timerWarningColor:
          type: string
        timerCriticalColor:
          type: string
        clockDateFormat:
          type: string
          enum: [short, long, numeric]
        clockFontSize:
          type: integer
        clockColor:
          type: string
        logoOverlayEnabled:
          type: boolean
        logoUrl:
          type: string
        logoPosition:
          type: string
          enum: [top-left, top-right, bottom-left, bottom-right, center]
        logoSize:
          type: integer
        logoOpacity:
          type: integer
        textOverlayEnabled:
          type: boolean
        textOverlayContent:
          type: string
        textOverlayPosition:
          type: string
          enum: [top-left, top-center, top-right, center-left, center, center-right, bottom-left, bottom-center, bottom-right]
        textOverlayFontSize:
          type: integer
        textOverlayColor:
          type: string
        textOverlayBg:
          type: string
        textOverlayBold:
          type: boolean
        textOverlayItalic:
          type: boolean
        textOverlayAlign:
          type: string
          enum: [left, center, right]
        textOverlayFontFamily:
          type: string
        textOverlayShadow:
          type: boolean
        bibleRefFontSize:
          type: integer
          description: "Font size in px for the scripture reference label at the bottom of bible verses."
        bibleRefColor:
          type: string
        bibleRefBgColor:
          type: string
        bibleRefBold:
          type: boolean
        bibleRefShowTranslation:
          type: boolean
        bibleRefPadding:
          type: integer
        bibleRefRadius:
          type: integer
        bibleRefLetterSpacing:
          type: integer
          description: "Letter spacing in 0.01em units (e.g. 4 = 0.04em)."
        bibleRefUppercase:
          type: boolean
        bibleRefShow:
          type: boolean
        bibleBookShow:
          type: boolean
        bibleBookFontSize:
          type: integer
        bibleBookColor:
          type: string
        bibleBookBgColor:
          type: string
        bibleBookBold:
          type: boolean
        bibleBookPadding:
          type: integer
        bibleBookRadius:
          type: integer
        bibleBookLetterSpacing:
          type: integer
        bibleBookUppercase:
          type: boolean
      required:
        - isBlack
        - isClear
        - contentType
